<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#4a7dff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>种子计数器 - Seed Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>种子计数器</h1>
    <p class="subtitle">拍照或上传图片，自动识别并计数种子数量</p>
  </header>

  <main>
    <!-- Upload Area -->
    <div class="card upload-card">
      <div class="upload-buttons">
        <button id="cameraBtn" class="upload-btn camera-btn">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>拍照识别</span>
        </button>
        <button id="galleryBtn" class="upload-btn gallery-btn">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>从相册选择</span>
        </button>
      </div>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>正在加载 OpenCV.js，请稍候...</p>
    </div>

    <!-- Result Section -->
    <div id="resultSection" class="hidden">
      <!-- Count Display -->
      <div class="card result-card">
        <div class="result-number">
          <span id="seedCount">0</span>
        </div>
        <p class="result-label">检测到的种子数量</p>
      </div>

      <!-- Parameter Controls -->
      <div class="card params-card">
        <h3>参数调节</h3>
        <div class="param-group">
          <label>
            <span>模糊程度</span>
            <span class="param-value" id="blurVal">7</span>
          </label>
          <input type="range" id="blurSize" min="1" max="21" step="2" value="7">
        </div>
        <div class="param-group">
          <label>
            <span>最小种子面积 (px)</span>
            <span class="param-value" id="minAreaVal">300</span>
          </label>
          <input type="range" id="minArea" min="10" max="5000" step="10" value="300">
        </div>
        <div class="param-group">
          <label>
            <span>最大种子面积 (px)</span>
            <span class="param-value" id="maxAreaVal">20000</span>
          </label>
          <input type="range" id="maxArea" min="500" max="50000" step="500" value="20000">
        </div>
        <div class="param-group">
          <label>
            <span>形态学核大小</span>
            <span class="param-value" id="kernelVal">5</span>
          </label>
          <input type="range" id="kernelSize" min="1" max="15" step="2" value="5">
        </div>
        <div class="param-group">
          <label>
            <span>分离强度 (%)</span>
            <span class="param-value" id="sepVal">20</span>
          </label>
          <input type="range" id="separationLevel" min="0" max="80" step="1" value="20">
        </div>
        <div class="param-group">
          <label>
            <span>最小圆度 (%)</span>
            <span class="param-value" id="circVal">20</span>
          </label>
          <input type="range" id="minCircularity" min="0" max="100" step="1" value="20">
        </div>
        <div class="param-group checkbox-group">
          <label>
            <input type="checkbox" id="invertToggle">
            <span>反转二值化（深色背景上的浅色种子）</span>
          </label>
        </div>
      </div>

      <!-- Images -->
      <div class="images-grid">
        <div class="card image-card">
          <h3>原始图片</h3>
          <canvas id="originalCanvas"></canvas>
        </div>
        <div class="card image-card">
          <h3>处理结果</h3>
          <canvas id="resultCanvas"></canvas>
        </div>
      </div>

      <!-- Debug View -->
      <div class="card image-card debug-card">
        <h3>二值化预览（调参参考）</h3>
        <canvas id="threshCanvas"></canvas>
      </div>
    </div>
  </main>

  <footer>
    <p>种子计数器 v1.0</p>
  </footer>

  <script async src="opencv.js" onload="(function(){if(typeof cv==='undefined')return;if(cv.Mat){onOpenCvReady();}else{cv['onRuntimeInitialized']=onOpenCvReady;}})();" type="text/javascript"></script>
  <script src="app.js"></script>
</body>
</html>
